name: Mitts PR Follow-up

# Comment "@mitts <instructions>" on a PR to give the bot instructions:
#   - "@mitts add error handling for nil config"  -> pushes commits to the PR branch
#   - "@mitts why did you use a mutex here?"       -> replies in the thread
# The bot works ON the PR's own branch (follow-up commits), and can also just
# discuss without changing code.
on:
  issue_comment:
    types: [created]

concurrency:
  # Serialize all STATEFUL work on the same PR (shares the mitts-state-pr-<n>
  # artifact + pushes to the PR branch). Group is keyed on the PR number only, not
  # the workflow, so any future stateful PR workflow can share this queue. The
  # read-only review workflow stays on its own group (mitts-review-<n>).
  group: mitts-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  followup:
    # Only on PRs, when a comment mentions the bot but is NOT the "review" command
    # (that's handled by mitts-pr-review.yml). Gated on author_association so
    # only trusted maintainers (OWNER/MEMBER/COLLABORATOR) can push follow-up
    # commits — this bot writes to the PR branch, so an untrusted trigger is a
    # code-execution vector on a public repo.
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@mitts') &&
      !contains(github.event.comment.body, '@mitts review') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push follow-up commits to the PR branch
      pull-requests: write   # comment / update PR
      issues: write
    steps:
      - name: Acknowledge comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -X POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes'

      - name: Get PR head ref
        id: prref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # issue_comment doesn't carry PR branch info, so fetch it.
          data=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}" \
            --jq '{ref: .head.ref, repo: .head.repo.full_name, base: .base.ref}')
          echo "head_ref=$(echo "$data" | jq -r .ref)" >> "$GITHUB_OUTPUT"
          echo "head_repo=$(echo "$data" | jq -r .repo)" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(echo "$data" | jq -r .base)" >> "$GITHUB_OUTPUT"

      - name: Guard against fork PRs
        if: steps.prref.outputs.head_repo != github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" \
            --body "🤖 I can't push follow-up commits to a PR from a fork (secrets aren't available on fork PRs). A maintainer can run me on a same-repo branch instead."
          echo "Fork PR — stopping."
          exit 1

      # Check out the PR head branch (same-repo only — reached after the fork
      # guard). Also makes the local composite action available to `uses` below.
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.prref.outputs.head_ref }}
          fetch-depth: 0

      # Shared setup + run (toolchain, state restore/persist, agent).
      - uses: ./.github/actions/run-mitts
        with:
          surface: pr
          number: ${{ github.event.issue.number }}
          title: ${{ github.event.issue.title }}
          head-ref: ${{ steps.prref.outputs.head_ref }}
          base-ref: ${{ steps.prref.outputs.base_ref }}
          comment-body: ${{ github.event.comment.body }}
          comment-author: ${{ github.event.comment.user.login }}
          llm-api-key: ${{ secrets.OPENHANDS_LLM_API_KEY }}
          llm-model: ${{ vars.OPENHANDS_LLM_MODEL }}
          llm-base-url: ${{ vars.OPENHANDS_LLM_BASE_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" \
            --body "⚠️ I couldn't complete that. See the [run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
