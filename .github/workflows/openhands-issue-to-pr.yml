name: OpenHands Issue to PR

# Comment "@openhands implement" (or "@openhands <instructions>") on an ISSUE
# and the agent will write code and open a PR that closes the issue.
on:
  issue_comment:
    types: [created]

concurrency:
  group: openhands-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    # Only on issues (not PRs) where a comment mentions the bot.
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '@openhands')
    runs-on: ubuntu-latest
    permissions:
      contents: write         # push a branch
      pull-requests: write    # open the PR
      issues: write           # comment back on the issue
    steps:
      - name: Acknowledge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🤖 On it — working on this in a new branch. I'll open a PR when ready. [Watch the run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Ruby project: let the agent run the gem's tests.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6

      - name: Run OpenHands agent
        env:
          LLM_API_KEY: ${{ secrets.OPENHANDS_LLM_API_KEY }}
          LLM_MODEL: ${{ vars.OPENHANDS_LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.OPENHANDS_LLM_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          export AGENT_PROMPT="$(cat <<'EOF'
          You are an autonomous coding agent working on the repository checked out in the current directory.
          This is the Ruby gem "claude_hooks". Follow existing conventions, keep changes minimal and focused.

          A maintainer asked you to implement work described in a GitHub issue. Do the following:

          1. Read the issue and the triggering comment (provided below) to understand the request.
             If the request is ambiguous, make the most reasonable interpretation and note assumptions in the PR body.
          2. Create a new branch named `openhands/issue-${ISSUE_NUMBER}`.
          3. Implement the change. Run the test suite with `ruby test/run_all_tests.rb` (after `bundle install`)
             and make sure it passes. Update or add tests as appropriate. Update docs/README if relevant.
          4. Commit with a clear message referencing the issue.
          5. Push the branch and open a pull request with `gh pr create`, targeting the default branch.
             In the PR body: summarize what you did, list any assumptions, note how you verified it,
             and include the line "Closes #${ISSUE_NUMBER}".
          6. Post a short comment on issue #${ISSUE_NUMBER} linking to the PR.

          Use the `gh` CLI for all GitHub interactions (it is already authenticated).
          Do not force-push over unrelated branches. Do not modify CI secrets or workflow permissions.

          --- ISSUE #${ISSUE_NUMBER}: ${ISSUE_TITLE} ---
          ${ISSUE_BODY}

          --- TRIGGERING COMMENT (by @${COMMENT_AUTHOR}) ---
          ${COMMENT_BODY}
          EOF
          )"
          python .github/openhands/agent_task.py

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "⚠️ I couldn't complete this task. See the [run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
